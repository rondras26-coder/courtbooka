# Local Supabase CLI workspace (Courtbooka).
# Remote: `supabase link --project-ref <your-project-ref>` then `supabase db push`.
# https://supabase.com/docs/guides/cli/getting-started

project_id = "courtbooka"

[api]
enabled = true

[db]
# Align with Supabase hosted Postgres major where practical (see dashboard → Database).
port = 54322
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323
